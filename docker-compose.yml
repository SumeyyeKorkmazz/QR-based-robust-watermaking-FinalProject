version: '3.8'

services:
  db:
    image: postgres:15
    container_name: tracemark-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: tracemark_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: tracemark-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/tracemark_db
    depends_on:
      - db
    volumes:
      # Sadece backend kodunu ve imwatermark'i bağla ki anlık değisiklikler yansısın
      - ./backend:/app/backend
      - ./imwatermark:/app/imwatermark

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tracemark-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - WATCHPACK_POLLING=true

volumes:
  postgres_data:
